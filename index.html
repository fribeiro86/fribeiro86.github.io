<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Viagem Gol</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Registro de Viagem</h1>

        <form id="trip-form">
            <label for="driver-name">Nome do Motorista:</label>
            <input type="text" id="driver-name" value="Fabio Brum" required><br>

            <label for="plate">Placa do Veículo:</label>
            <input type="text" id="plate" value="XTE-3323" required><br>

            <label for="phone">Telefone:</label>
            <input type="tel" id="phone" value="48991411108" required><br>

            <label for="departure-date">Data de Saída:</label>
            <input type="date" id="departure-date" value="2024-07-02" required><br>

            <label for="departure-time">Horário de Saída:</label>
            <input type="time" id="departure-time" value="10:20" required><br>

            <label for="arrival-time">Horário de Chegada:</label>
            <input type="time" id="arrival-time" value="11:20" required><br>

            <label for="destination">Destino:</label>
            <input type="text" id="destination" value="Gramado" required><br>

            <label for="passenger-count">Passageiros Embarcados (quantidade):</label>
            <input type="number" id="passenger-count" value="20" required><br>

            <label for="passenger-name">Nome do Passageiro:</label>
            <input type="text" id="passenger-name"><br>

            <button type="button" id="add-passenger">Adicionar Passageiro</button>
            <button type="submit">Concluir</button>
        </form>

        <h2>Passageiros</h2>
        <ul id="passenger-list"></ul>

        <h2>Detalhes da Viagem</h2>
        <pre id="trip-details"></pre>

        <button id="print-button">Imprimir Passageiros</button>

        <div id="print-area" class="printable">
            <h2>Detalhes da Viagem</h2>
            <div id="print-trip-details"></div>
            <h2>Passageiros</h2>
            <ul id="print-passenger-list"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
